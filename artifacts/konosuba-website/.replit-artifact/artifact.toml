kind = "web"
previewPath = "/"
title = "Konosuba Community"
version = "1.0.0"
id = "artifacts/konosuba-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23225

[services.development]
run = "pnpm --filter @workspace/konosuba-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/konosuba-website", "run", "build" ]
publicDir = "artifacts/konosuba-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23225"
BASE_PATH = "/"
